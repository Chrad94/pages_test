rategy": "neutral-overheated", "ret": 1.3739041191684898}, {"ts_ms": 1775509714233, "strategy": "neutral-overheated", "ret": 0.7875354858948969}, {"ts_ms": 1775553025265, "strategy": "neutral-overheated", "ret": 1.4180292357305557}];

  function aggregate(records) {
    const byStrat = {};
    for (const r of records) {
      if (!byStrat[r.strategy]) byStrat[r.strategy] = { sum: 0, count: 0 };
      byStrat[r.strategy].sum += r.ret;
      byStrat[r.strategy].count += 1;
    }
    const rows = Object.entries(byStrat).map(([s, v]) => ({
      strategy: s,
      avg: v.sum / v.count,
      count: v.count,
      sum: v.sum,
    }));
    rows.sort((a, b) => b.avg - a.avg);
    return rows;
  }

  function computeWavg(rows) {
    let totalCount = 0;
    for (const r of rows) totalCount += r.count;
    if (totalCount === 0) return null;
    let wsum = 0;
    for (const r of rows) wsum += r.avg * r.count;
    return wsum / totalCount;
  }

  function sendStats(rows) {
    const wavg = computeWavg(rows);
    let est30d = null;
    if (wavg !== null) {
      const dec = wavg / 100.0;
      if ((1.0 + dec) > 0) est30d = (Math.pow(1.0 + dec, 60) - 1.0) * 100.0;
    }
    try {
      if (window.parent) {
        window.parent.postMessage({ type: 'strategy_hist_stats', wavg: wavg, est30d: est30d }, '*');
      }
    } catch (e) {}
  }

  function render(records, label) {
    const rows = aggregate(records);
    sendStats(rows);
    const colors = rows.map(r => r.avg >= 0 ? '#51cf66' : '#ff6b6b');
    const data = [{
      type: 'bar',
      x: rows.map(r => r.strategy),
      y: rows.map(r => r.avg),
      marker: { color: colors },
      customdata: rows.map(r => [r.count, r.sum]),
      hovertemplate:
        'Strategy: %{x}<br>' +
        'Avg return: %{y:.4f}%<br>' +
        'Times active: %{customdata[0]}<br>' +
        'Total return: %{customdata[1]:.4f}%' +
        '<extra></extra>',
    }];
    const layout = {
      paper_bgcolor: '#1a1d29',
      plot_bgcolor: '#1a1d29',
      font: { color: '#e0e0e0' },
      margin: { l:40, r:20, t:30, b:80 },
      xaxis: { gridcolor:'#2d3142', zerolinecolor:'#2d3142' },
      yaxis: { gridcolor:'#2d3142', zerolinecolor:'#2d3142',
               title: { text:'Avg equity step return per strategy (%)' } },
    };
    const config = { displaylogo:false, responsive:true, scrollZoom:true };
    if (!window._chartReady) {
      Plotly.newPlot('chart', data, layout, config);
      window._chartReady = true;
    } else {
      Plotly.react('chart', data, layout, config);
    }
    document.getElementById('zoom-label').textContent = 'showing: ' + label;
  }

  render(RAW, 'all data');

  window.addEventListener('message', function(ev) {
    const msg = ev && ev.data;
    if (!msg || msg.type !== 'equity_zoom_range') return;
    const startMs = msg.startMs;
    const endMs = msg.endMs;
    if (startMs === null || endMs === null || startMs === undefined || endMs === undefined) {
      render(RAW, 'all data');
      return;
    }
    const filtered = RAW.filter(r => r.ts_ms >= startMs && r.ts_ms <= endMs);
    if (filtered.length === 0) {
      render(RAW, 'all data (no trades in zoom)');
      return;
    }
    const d1 = new Date(startMs).toLocaleDateString();
    const d2 = new Date(endMs).toLocaleDateString();
    render(filtered, d1 + ' – ' + d2);
  });
})();
