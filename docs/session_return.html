      (gd._fullLayout && gd._fullLayout.xaxis) ||
      (gd.layout && gd.layout.xaxis);
    const xr = ax && ax.range;
    return (xr && xr.length === 2) ? xr : null;
  }

  function update() {
    try {
      const TR_INDEX = 1;
      const tr = (gd._fullData && gd._fullData[TR_INDEX]) || (gd.data && gd.data[TR_INDEX]);
      if (!tr || !tr.x || !tr.y) return sendToParent(null);

      const xs = Array.from(tr.x, toMs);
      const ys = Array.from(tr.y, (v) => (typeof v === 'number' ? v : Number(v)));
      if (xs.length !== ys.length || xs.length === 0) return sendToParent(null);
      if (xs.some(v => v === null)) return sendToParent(null);

      // Default range: full extent
      let leftT = xs[0];
      let rightT = xs[xs.length - 1];

      const xr = currentXRange();
      if (xr) {
        const a = toMs(xr[0]);
        const b = toMs(xr[1]);
        if (a !== null && b !== null) { leftT = a; rightT = b; }
      }
      if (leftT > rightT) { const tmp = leftT; leftT = rightT; rightT = tmp; }

      let sum = 0;
      let cnt = 0;
      for (let i = 0; i < xs.length; i++) {
        const t = xs[i];
        if (t >= leftT && t <= rightT) {
          const y = ys[i];
          if (Number.isFinite(y)) {
            sum += y;
            cnt += 1;
          }
        }
      }

      const avg = (cnt > 0) ? (sum / cnt) : null;
      sendToParent(avg);
    } catch (e) {
      sendToParent(null);
    }
  }

  gd.on('plotly_relayout', update);
  gd.on('plotly_afterplot', update);
  update();
})();
