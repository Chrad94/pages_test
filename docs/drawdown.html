      if (k === 'xaxis.range' || k === 'xaxis.autorange') return true;
      if (k.indexOf('xaxis.range[') === 0) return true;
    }
    return false;
  }

  function applyAutoYForCurrentX() {
    const xr = currentXRangeMs();
    if (!xr) return;
    const yr = computeYRangeForWindow(xr[0], xr[1]);
    if (!yr) return;
    inAuto = true;
    Plotly.relayout(gd, { 'yaxis.range': yr, 'yaxis.autorange': false });
    inAuto = false;
  }

  // Listen for preset range buttons from the parent dashboard (postMessage)
  window.addEventListener('message', (ev) => {
    const msg = ev && ev.data;
    if (!msg || msg.type !== 'set_range') return;

    try {
      const xsS = getSortedXsMs();
      if (!xsS || xsS.length < 2) return;

      const end = xsS[xsS.length - 1];
      const minX = xsS[0];
      const dayMs = 86400000;

      if (msg.range === 'all') {
        inAuto = true;
        Plotly.relayout(gd, { 'xaxis.autorange': true, 'yaxis.autorange': true });

        return;

      let start = null;
      if (msg.range === '7d') start = end - 7 * dayMs;
      if (msg.range === '14d') start = end - 14 * dayMs;
      if (msg.range === '30d') start = end - 30 * dayMs;
      if (start === null) return;

      if (start < minX) start = minX;

      const yr = computeYRangeForWindow(start, end);
      const relayoutObj = {
        'xaxis.range': [new Date(start).toISOString(), new Date(end).toISOString()]

      if (yr) {

        relayoutObj['yaxis.autorange'] = false;

      }

      inAuto = true;
      Plotly.relayout(gd, relayoutObj);
      inAuto = false;
    } catch (e) {
      // no-op
    }
  });

  gd.on('plotly_relayout', (ed) => {
    try {
      if (inAuto) return;
      if (hasXKeys(ed) && !hasYKeys(ed)) {

          inAuto = true;
          Plotly.relayout(gd, { 'yaxis.autorange': true });

(function () {

  if (!gd) return;

  const MSG_TYPE = "drawdown_min";

  function sendToParent(minVal) {
    try {
      if (window.parent) {
        window.parent.postMessage({ type: MSG_TYPE, minVal: minVal }, '*');
      }
    } catch (e) {}
  }

  function toMs(x) {
    if (x == null) return null;
    if (typeof x === 'number') {
      if (x > 1e12) return x;
      if (x > 1e9) return x * 1000;
      return x;
    }
    const ms = Date.parse(x);
    return Number.isFinite(ms) ? ms : null;
  }

  function currentXRange() {
    const ax =
      (gd._fullLayout && gd._fullLayout.xaxis) ||
      (gd.layout && gd.layout.xaxis);
    const xr = ax && ax.range;
    return (xr && xr.length === 2) ? xr : null;
  }

  function update() {
    try {
      const tr = (gd._fullData && gd._fullData[0]) || (gd.data && gd.data[0]);
      if (!tr || !tr.x || !tr.y) return sendToParent(null);

      const xs = Array.from(tr.x, toMs);
      const ys = Array.from(tr.y, (v) => (typeof v === 'number' ? v : Number(v)));
      if (xs.length !== ys.length || xs.length === 0) return sendToParent(null);
      if (xs.some(v => v === null)) return sendToParent(null);

      let leftT = xs[0];
      let rightT = xs[xs.length - 1];

      const xr = currentXRange();
      if (xr) {
        const a = toMs(xr[0]);
        const b = toMs(xr[1]);
        if (a !== null && b !== null) { leftT = a; rightT = b; }
      }
      if (leftT > rightT) { const tmp = leftT; leftT = rightT; rightT = tmp; }

      let minY = Infinity;
      for (let i = 0; i < xs.length; i++) {
        if (xs[i] >= leftT && xs[i] <= rightT) {
          const y = ys[i];
          if (Number.isFinite(y) && y < minY) minY = y;
        }
      }
      sendToParent(Number.isFinite(minY) ? minY : null);
    } catch (e) {
      sendToParent(null);
    }
  }

  gd.on('plotly_relayout', update);
  gd.on('plotly_afterplot', update);
  update();
})();
