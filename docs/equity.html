(function () {
  const gd = document.getElementById('equity-chart');
  if (!gd) return;

  // Create a readout below the chart (inside the same HTML/iframe)
  const out = document.createElement('div');
  out.style.display = 'none';
  document.body.appendChild(out);

  function sendToParent(est30) {
    try {
      if (window.parent) {
        window.parent.postMessage({ type: 'equity_c30dr', est30: est30 }, '*');
      }
    } catch (e) {}
  }

  // Hide strategy marker traces whose points all fall outside the current zoom window
  let _visUpdatePending = false;
  function updateStrategyVisibility(leftT, rightT) {
    if (_visUpdatePending) return;
    _visUpdatePending = true;
    requestAnimationFrame(function() {
      _visUpdatePending = false;
      try {
        const data = (gd._fullData && gd._fullData.length ? gd._fullData : (gd.data || []));
        const indices = [];
        const visVals = [];
        for (let i = 0; i < data.length; i++) {
          const tr = data[i];
          if (!tr || tr.name === 'Equity') continue;  // skip main line
          const xs = tr.x || [];
          let hasVisible = false;
          for (let j = 0; j < xs.length; j++) {
            const t = toMs(xs[j]);
            if (t !== null && t >= leftT && t <= rightT) { hasVisible = true; break; }
          }
          indices.push(i);
          visVals.push(hasVisible);
        }
        if (indices.length > 0) {
          Plotly.restyle(gd, { visible: visVals }, indices);
        }
      } catch (e) {}
    });
  }

  function pickTraceIndex() {
    // Prefer the main equity line trace (named "Equity" in the generator)
    const data = gd.data || [];
    for (let i = 0; i < data.length; i++) {
      const tr = data[i];
      if (tr && tr.name === 'Equity') return i;
    }
    return 0;
  }
  const tIdx = pickTraceIndex();

  function toMs(x) {
    if (x == null) return null;
    if (typeof x === 'number') {
      // Heuristic: seconds vs milliseconds
      if (x > 1e12) return x;           // already ms
      if (x > 1e9) return x * 1000;     // seconds
      return x;                         // fallback
    }
    // Strings / Dates
    const ms = Date.parse(x);
    return Number.isFinite(ms) ? ms : null;
  }

  function lowerBound(xs, t) {
    let lo = 0, hi = xs.length;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (xs[mid] < t) lo = mid + 1;
      else hi = mid;
    }
    return lo;
  }
  function upperBound(xs, t) {
    let lo = 0, hi = xs.length;
    while (lo < hi) {
      const mid = (lo + hi) >> 1;
      if (xs[mid] <= t) lo = mid + 1;
      else hi = mid;
    }
    return lo;
  }

  function currentXRange() {
    // Use fullLayout first (more reliable after interactions)
    const ax =
      (gd._fullLayout && gd._fullLayout.xaxis) ||
      (gd.layout && gd.layout.xaxis);
    const xr = ax && ax.range;
    return (xr && xr.length === 2) ? xr : null;
  }

  function fmtPct(x) {
    if (!Number.isFinite(x)) return '—';
    const sign = x >= 0 ? '+' : '';

  }
  function fmtDays(d) {
    if (!Number.isFinite(d)) return '—';
    if (d < 1) return d.toFixed(2) + ' days';

  function setWhy(msg) {

  function isDepositTrace(tr) {
    if (!tr) return false;
    const name = (tr.name || '').toString().toLowerCase();
    const lg = (tr.legendgroup || '').toString().toLowerCase();
    return name === 'strategy: deposit' || lg === 'deposit';
  }

  function getDepositSet() {
    const data =
      (gd._fullData && gd._fullData.length ? gd._fullData : (gd.data || []));
    const out = new Set();

      const tr = data[i];
      if (!isDepositTrace(tr)) continue;
      const xs = tr.x || [];
      for (let j = 0; j < xs.length; j++) {
        const t = toMs(xs[j]);
        if (t !== null) out.add(t);
      }
    }
    return out;
  }

  function computeWindowFactor(xsS, ysS, iL, iR, depositSet) {
    let factor = 1;
    let used = 0;
    for (let i = iL + 1; i <= iR; i++) {

      const yCurr = ysS[i];

      used++;
    }
    if (used === 0) return { factor: null, reason: 'Not enough non-deposit points.' };
    return { factor: factor, reason: null };
  }

  function update() {
    try {
      const tr =
        (gd._fullData && gd._fullData[tIdx]) ||
        (gd.data && gd.data[tIdx]);
      if (!tr) return setWhy('No trace data found.');
      if (!tr.x || !tr.y) return setWhy('Trace has no x/y.');
      if (tr.x.length < 2 || tr.y.length < 2) return setWhy('Not enough points.');

      const xs = Array.from(tr.x, toMs);
      const ys = Array.from(tr.y, Number);

      if (xs.some(v => v === null)) return setWhy('Could not parse timestamps.');
      if (ys.some(v => !Number.isFinite(v))) return setWhy('Could not parse equity values.');

      // Ensure sorted by time (Plotly usually is, but be safe)
      // If not sorted, sort indices by xs.
      let idx = xs.map((v, i) => i);
      for (let i = 1; i < xs.length; i++) {
        if (xs[i] < xs[i - 1]) { // unsorted
          idx.sort((a, b) => xs[a] - xs[b]);
          break;
        }
      }

      const xsS = idx.map(i => xs[i]);
      const ysS = idx.map(i => ys[i]);

      // Default: full extent
      let leftT = xsS[0], rightT = xsS[xsS.length - 1];

      // If zoomed/panned, use the visible x-range
      const xr = currentXRange();
      if (xr) {
        const a = toMs(xr[0]), b = toMs(xr[1]);
        if (a !== null && b !== null) { leftT = a; rightT = b; }
      }
      if (leftT > rightT) { const tmp = leftT; leftT = rightT; rightT = tmp; }

      updateStrategyVisibility(leftT, rightT);

      // First point >= left edge, last point <= right edge
      let iL = lowerBound(xsS, leftT);
      if (iL >= xsS.length) iL = xsS.length - 1;

      let iR = upperBound(xsS, rightT) - 1;
      if (iR < 0) iR = 0;

      // Ensure at least two distinct points if possible
      if (iR === iL && xsS.length >= 2) {
        if (iR < xsS.length - 1) iR = iL + 1;
        else if (iL > 0) iL = iR - 1;
      }

      const first = ysS[iL];
      const last = ysS[iR];

      if (!Number.isFinite(first) || !Number.isFinite(last) || first === 0) {
        return setWhy('Invalid first/last value.');
      }

      const depositSet = getDepositSet();
      const factorInfo = computeWindowFactor(xsS, ysS, iL, iR, depositSet);
      if (!factorInfo || factorInfo.factor === null || !(factorInfo.factor > 0)) {
        return setWhy((factorInfo && factorInfo.reason) ? factorInfo.reason : 'Invalid window factor.');
      }
      const factorWindow = factorInfo.factor;
      const windowRet = (factorWindow - 1) * 100;

      const dtDays = (xsS[iR] - xsS[iL]) / 86400000; // ms -> days

      // Extrapolate to compounded 30-day return using time span of window:
      // factor_window = compounded return excluding deposit points
      // daily_factor = factor_window^(1/dtDays), factor_30 = daily_factor^30
      let est30 = NaN;
      if (Number.isFinite(dtDays) && dtDays > 0) {
        const dailyFactor = Math.pow(factorWindow, 1 / dtDays);
        const factor30 = Math.pow(dailyFactor, 30);
        est30 = (factor30 - 1) * 100;
      }

      sendToParent(est30);
      out.textContent = "c30dR: " + fmtPct(est30);
      try {
        if (window.parent) {
          window.parent.postMessage({ type: 'equity_zoom_range', startMs: leftT, endMs: rightT }, '*');
        }
      } catch (_e) {}
} catch (e) {
      setWhy('JS error computing returns.');
      // Uncomment to debug in console:
      // console.error('Window return calc error', e);
    }
  }

  function getSortedXsMs() {
    const tr =
      (gd._fullData && gd._fullData[tIdx]) ||
      (gd.data && gd.data[tIdx]);
    if (!tr || !tr.x || tr.x.length < 2) return null;
    const xs = Array.from(tr.x, toMs);
    if (xs.some(v => v === null)) return null;

    // Sort if needed
    let idx = xs.map((_, i) => i);
    for (let i = 1; i < xs.length; i++) {
      if (xs[i] < xs[i - 1]) {
        idx.sort((a, b) => xs[a] - xs[b]);
        break;
      }
    }
    return idx.map(i => xs[i]);
  }

  function computeYRangeForWindow(startMs, endMs) {
    const tr =
      (gd._fullData && gd._fullData[tIdx]) ||
      (gd.data && gd.data[tIdx]);
    if (!tr || !tr.x || !tr.y) return null;

    const xs = Array.from(tr.x, toMs);
    const ys = Array.from(tr.y, (v) => (typeof v === 'number' ? v : Number(v)));
    if (xs.length !== ys.length || xs.length < 2) return null;
    if (xs.some(v => v === null)) return null;

    let yMin = Infinity;
    let yMax = -Infinity;
    for (let i = 0; i < xs.length; i++) {
      const t = xs[i];
      if (t >= startMs && t <= endMs) {
        const y = ys[i];
        if (!Number.isFinite(y)) continue;
        if (y < yMin) yMin = y;
        if (y > yMax) yMax = y;
      }
    }
    if (!Number.isFinite(yMin) || !Number.isFinite(yMax)) return null;

    const span = yMax - yMin;
    const pad = (span === 0)
      ? (Math.abs(yMax) * 0.01 || 1)
      : span * 0.05; // 5% margin
    return [yMin - pad, yMax + pad];
  }

  let inAuto = false;

  // Listen for preset range buttons from the parent dashboard
  window.addEventListener('message', (ev) => {
    const msg = ev && ev.data;
    if (!msg || (msg.type !== 'set_range' && msg.type !== 'equity_set_range')) return;

    try {
      const xsS = getSortedXsMs();
      if (!xsS || xsS.length < 2) return;

      const end = xsS[xsS.length - 1];
      const minX = xsS[0];
      const dayMs = 86400000;

      if (msg.range === 'all') {
        inAuto = true;
        Plotly.relayout(gd, { 'xaxis.autorange': true, 'yaxis.autorange': true });
        inAuto = false;
        return;
      }

      let start = null;
      if (msg.range === '7d') start = end - 7 * dayMs;
      if (msg.range === '14d') start = end - 14 * dayMs;
      if (msg.range === '30d') start = end - 30 * dayMs;
      if (start === null) return;

      if (start < minX) start = minX;

      const yr = computeYRangeForWindow(start, end);
      const windowMs = end - start;
      const xPad = Math.min(windowMs * 0.05, dayMs); // Add headroom on the right edge.
      const paddedEnd = end + xPad;
      const relayoutObj = {
        'xaxis.range': [new Date(start).toISOString(), new Date(paddedEnd).toISOString()]
      };
      if (yr) {
        relayoutObj['yaxis.range'] = yr;
        relayoutObj['yaxis.autorange'] = false;
      } else {
        // Fallback: let Plotly figure it out
        relayoutObj['yaxis.autorange'] = true;
      }
      inAuto = true;
      Plotly.relayout(gd, relayoutObj);
      inAuto = false;
    } catch (e) {
      // no-op
    }
  });

  function hasYKeys(ed) {
    if (!ed) return false;
    for (const k in ed) {
      if (k === 'yaxis.range' || k === 'yaxis.autorange') return true;
      if (k.indexOf('yaxis.range[') === 0) return true;
    }
    return false;
  }

  function hasXKeys(ed) {
    if (!ed) return false;
    for (const k in ed) {
      if (k === 'xaxis.range' || k === 'xaxis.autorange') return true;
      if (k.indexOf('xaxis.range[') === 0) return true;
    }
    return false;
  }

  function applyAutoYForCurrentX() {
    const xr = currentXRange();
    if (!xr) return;
    const a = toMs(xr[0]);
    const b = toMs(xr[1]);
    if (a === null || b === null) return;
    const start = Math.min(a, b);
    const end = Math.max(a, b);
    const yr = computeYRangeForWindow(start, end);
    if (!yr) return;
    inAuto = true;
    Plotly.relayout(gd, { 'yaxis.range': yr, 'yaxis.autorange': false });
    inAuto = false;
  }

  function onRelayout(ed) {
    try {
      if (!inAuto && hasXKeys(ed) && !hasYKeys(ed)) {
        if (ed && ed['xaxis.autorange'] === true) {
          inAuto = true;
          Plotly.relayout(gd, { 'yaxis.autorange': true });
          inAuto = false;
        } else {
          setTimeout(() => { if (!inAuto) applyAutoYForCurrentX(); }, 0);
        }
      }
    } catch (e) {}
    update();
  }

  gd.on('plotly_relayout', onRelayout);
  gd.on('plotly_afterplot', update);
  update();
})();
(function() {

  if (!gd) {
    console.error('Could not find equity-chart element');
    return;

  console.log('Log scale toggle initialized for equity-chart');

  // Listen for messages from parent
  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'toggle_log_scale') {
      isLogScale = !isLogScale;
      console.log('Toggling log scale to:', isLogScale ? 'log' : 'linear');
      Plotly.relayout(gd, {'yaxis.type': isLogScale ? 'log' : 'linear'});
    }
  });
})();
